name: Deploy MCP Playground To Aliyun FC

on:
  push:
    branches: [playground]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 's.yaml'
      - 's.playground.yaml'
      - '.signore'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-fc-deploy.yml
    with:
      notify_title: Playground MCP 部署
      template_file: s.playground.yaml
      function_name: ec-usercenter-mcp-playground
      github_environment: playground
      ec_api_base_url: http://ucapi-playground.easecation.net
    secrets: inherit
